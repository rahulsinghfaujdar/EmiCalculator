name: Android APK CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_env:
        description: 'Build environment flavor'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run test cases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'

      - name: Ensure npm version
        run: npm install -g npm@10.8.2

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run test cases
        run: npm test -- --runInBand

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test

    env:
      BUILD_ENV: ${{ github.event.inputs.build_env || 'dev' }}
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.2'

      - name: Ensure npm version
        run: npm install -g npm@10.8.2

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build APK for selected flavor
        working-directory: android
        run: |
          case "${BUILD_ENV}-${BUILD_TYPE}" in
            dev-debug)
              ./gradlew assembleDevDebug --no-daemon
              ;;
            dev-release)
              ./gradlew assembleDevRelease --no-daemon
              ;;
            prod-debug)
              ./gradlew assembleProdDebug --no-daemon
              ;;
            prod-release)
              ./gradlew assembleProdRelease --no-daemon
              ;;
            *)
              echo "Unsupported build flavor/type: ${BUILD_ENV}-${BUILD_TYPE}"
              exit 1
              ;;
          esac

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmiCalculator-${{ env.BUILD_ENV }}-${{ env.BUILD_TYPE }}-apk
          path: android/app/build/outputs/apk/${{ env.BUILD_ENV }}/${{ env.BUILD_TYPE }}/app-${{ env.BUILD_ENV }}-${{ env.BUILD_TYPE }}.apk
